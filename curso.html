<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!--bootstrap 5.2-->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        #brand {
            color: #000;
        }

        .nav-link {
            color: #000 ! important;
        }

        .nav-link.nav-link:hover {
            color: #000 ! important;
        }
    </style>

</head>

<body>
    <header>
        <nav class="navbar navbar-expand-lg bg-success text-white border-botton navbar-dark">
            <div class="container">
                <a class=" navbar-brand fw-bold" id="brand" href="./admin.html">
                    <i class="bi bi-mortarboard"></i>
                    Sistema Academico
                </a>


                <button class="navbar-toggler" type="button" data-bs-toggler="collapse" data-bs-target="#menu">
                    <span class="navbar-toggler-icon"></span>
                </button>


                <div class="collapse navbar-collapse" id="menu">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item">
                            <a class="nav-link">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link">Cursos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link">Professores</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link">Sair</a>
                        </li>

                    </ul>
                </div>
            </div>
        </nav>

    </header>
    <main>
        <div class="container py-4">
            <div class="card shadow">
                <div class="card-header bg-secondary text-white">
                    <h1 class="h4 mb-0">
                        <i class="bi bi-journal-bookmark-fill"></i>Cadastro de curso
                    </h1>

                </div>
                <div class="card-body">
                    <form id="formCurso">
                        <div class="mb-3">
                            <label for="nomeCurso" class="form-label">Nome do curso</label>
                            <input type="text" class="form-control" id="nomeCurso">
                            <div class="invalid-feedback"> Preencha dados </div>
                            <div class="valid-feedback"> certo </div>
                        </div>

                        <div class="mb-3">
                            <label for="CargahorariaCurso" class="form-label">Carga horaria</label>
                            <input type="number" class="form-control" id="CargahorariaCurso">
                            <div class="invalid-feedback"> Preencha dados </div>
                            <div class="valid-feedback"> certo </div>
                        </div>

                        <div class="mb-3">
                            <label for="descricaoCurso" class="form-label">Descrição</label>
                            <input type="text" class="form-control" id="descricaoCurso">
                            <div class="invalid-feedback"> Preencha dados </div>
                            <div class="valid-feedback"> certo </div>
                        </div>
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-save"></i>
                                salvar
                        </button>

                    </form>
                </div>
            </div>

    </main>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./script-curso.js"></script>

</body>

</html>
